name: Build OpenClash APK

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/vernesong/OpenClash.git
  REPO_BRANCH: dev
  OPENWRT_VERSION: 25.12.0
  OPENWRT_TARGET: x86
  OPENWRT_SUBTARGET: 64
  OPENWRT_ARCH: x86_64
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force

        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y \
          build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3-distutils python3-pyelftools \
          rsync unzip zlib1g-dev file wget curl subversion swig time zstd

        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Get OpenWrt SDK
      working-directory: /workdir
      run: |
        SDK_URL="https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${OPENWRT_TARGET}/${OPENWRT_SUBTARGET}/openwrt-sdk-${OPENWRT_VERSION}-${OPENWRT_TARGET}-${OPENWRT_SUBTARGET}_gcc-14.3.0_musl.Linux-x86_64.tar.zst"

        curl -SLk --connect-timeout 30 --retry 3 "$SDK_URL" -o SDK.tar.zst
        tar --zstd -xf SDK.tar.zst
        mv openwrt-sdk-* openwrtsdk

    - name: Clone OpenClash and build
      working-directory: /workdir/openwrtsdk
      run: |
        df -hT $PWD

        mkdir -p package/luci-app-openclash
        cd package/luci-app-openclash

        git init
        git remote add -f origin $REPO_URL
        git config core.sparsecheckout true
        echo "luci-app-openclash" >> .git/info/sparse-checkout
        git fetch --depth 1 origin $REPO_BRANCH
        git checkout -b $REPO_BRANCH origin/$REPO_BRANCH

        cd /workdir/openwrtsdk

        # 编译 po2lmo
        pushd package/luci-app-openclash/luci-app-openclash/tools/po2lmo
        make
        sudo make install
        popd

        make package/luci-app-openclash/luci-app-openclash/compile V=s

        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

    - name: Create tag
      id: tag
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        echo "status=success" >> $GITHUB_OUTPUT

        echo "Build output:"
        find "${{ env.FIRMWARE }}/bin/packages" -name "luci-app-openclash*.apk" -print

    - name: Upload APK to release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        files: ${{ env.FIRMWARE }}/bin/packages/${{ env.OPENWRT_ARCH }}/base/luci-app-openclash*.apk
